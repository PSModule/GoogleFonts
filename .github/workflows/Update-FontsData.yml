name: Update-FontsData

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions: {}

jobs:
  Update-FontsData:
    name: Update-FontsData
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update-FontsData
        uses: PSModule/GitHub-Script@8083ec1f733f00357ee4d0db0c6056686e483bc0 # v1.9.0
        env:
          GOOGLE_DEVELOPER_API_KEY: ${{ secrets.GOOGLE_DEVELOPER_API_KEY }} # zizmor: ignore[secrets-outside-env]
        with:
          ClientID: ${{ secrets.GOOGLEFONTS_UPDATER_BOT_CLIENT_ID }} # zizmor: ignore[secrets-outside-env]
          PrivateKey: ${{ secrets.GOOGLEFONTS_UPDATER_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          Script: scripts/Update-FontsData.ps1
